name: Weekly Telegram Stock Alert

on:
  schedule:
    # 매주 월요일 오전 8시 (KST) = 일요일 오후 11시 (UTC)
    - cron: '0 23 * * 0'
  workflow_dispatch:

env:
  # Node.js 20 deprecation 경고 해결을 위해 Node 24 사용 강제
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telepot finance-datareader pandas

      - name: Run bot script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        # 실행할 파이썬 파일명과 일치하는지 확인하십시오.
        run: python telegram_kospi_bot.py

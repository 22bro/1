import telepot
import FinanceDataReader as fdr
from datetime import datetime
import os

# GitHub Secrets 환경 변수
TELEGRAM_TOKEN = os.getenv("TELEGRAM_TOKEN")
CHAT_ID = os.getenv("CHAT_ID")

def get_kospi_report():
    try:
        # KOSPI 데이터 호출
        df = fdr.DataReader('KS11')
        current_data = df.iloc[-1]
        prev_data = df.iloc[-2]
        
        current_price = current_data['Close']
        change = current_price - prev_data['Close']
        change_percent = (change / prev_data['Close']) * 100
        
        symbol = "📈 상승" if change > 0 else "📉 하락"
        if abs(change_percent) < 0.01: symbol = "⚖️ 보합"

        now = datetime.now().strftime('%Y-%m-%d %H:%M')
        
        message = (
            f"🔔 [주간 코스피 리포트]\n"
            f"━━━━━━━━━━━━━━━\n"
            f"📅 시간: {now}\n"
            f"📍 지수: {current_price:,.2f}\n"
            f"📊 변동: {change:+.2f} ({change_percent:+.2f}%)\n"
            f"📢 상태: {symbol}\n"
            f"━━━━━━━━━━━━━━━\n"
            f"오늘도 성공적인 투자 되세요! 💪"
        )
        return message
    except Exception as e:
        return f"❌ 오류 발생: {str(e)}"

def send_telegram_msg(text):
    if not TELEGRAM_TOKEN or not CHAT_ID:
        print("Error: Missing environment variables.")
        return
    try:
        bot = telepot.Bot(TELEGRAM_TOKEN)
        bot.sendMessage(CHAT_ID, text)
        print("Success: Message sent.")
    except Exception as e:
        print(f"Failed: {e}")

if __name__ == "__main__":
    report = get_kospi_report()
    send_telegram_msg(report)

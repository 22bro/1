name: Weekly Telegram Stock Alert

on:
  schedule:
    # 10번 줄: 들여쓰기 공백 4칸 확인
    - cron: '0 23 * * 0'
  # 11번 줄: workflow_dispatch는 schedule과 같은 라인(공백 2칸)에 맞춰야 에러가 안 납니다.
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install telepot finance-datareader pandas

      - name: Run bot script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
        # 실행할 파이썬 파일명과 일치해야 함
        run: python telegram_kospi_bot.py
